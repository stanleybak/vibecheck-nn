# cifar100_2024 — CIFAR100 ResNet (medium/large), VNNCOMP regular track.
# Sister benchmark to tinyimagenet_2024 (same CIFAR/TinyImageNet ResNet family,
# same base pipeline). This config ports the validated tinyimagenet "lean"
# settings: skip the wasted Phase-1 MILP-tighten cascade and run the all-GPU
# reverse-mode α-zono Phase-8 BnB instead.
phase8_use_dual_ascent_gpu: true
phase8_dual_ascent_max_iter: 1
zono_lift_enabled: false             # skip Phase 2.5
phase2_crown_enabled: false          # reuse Phase 0.5 spec_lbs
phase8_min_budget_frac: 0.5          # Phase 8 gets >= half of total_timeout
pgd_middle_enabled: false            # skip Phase 3.5 (2.6 strictly better)
phase26_pgd_per_spec_min_per_spec: 0.5
phase26_pgd_per_spec_strict_min: true
pgd_restarts: 100
# Pre-cascade PGD re-enabled (below) as the SAT catcher. The old config caught
# hard resnet_large SAT cases via ~13s of parallel-PGD piggybacking on the MILP
# windows; with the cascade skipped there are no windows, so PGD needs that
# attack time directly. Budget tuned (per_spec_cap:15, total_frac:0.15) to catch
# all 5 resnet_large SAT misses (incl. prop_3585, needs ~13s) while keeping UNSAT
# cases ~34-35s (well under the 100s budget, still ~2.6x faster than ABC).
phase26_pre_cascade_total_frac: 0.15
phase26_pre_cascade_per_spec_cap: 15.0
# Lean Phase-1 (ported from tinyimagenet_2024, validated there: 200-case sweep
# vs α,β-CROWN = 0 false-verify / 0 MISS / +9 ABC-timeout wins, ~2x faster on
# UNSAT). The per-layer Gurobi MILP-tighten cascade (~13s/case here — the doc's
# "MILP windows") is wasted: alpha-CROWN (phase 0.5) closes nearly all disjuncts
# and the fast GPU Phase-8 BnB closes the rest from phase-0.5 bounds. Sound by
# construction (looser input bounds only make the sound Phase-8 BnB more
# conservative).
#   max_tighten_layer:0          -> skip the MILP-tighten cascade
#   parallel_pgd_enabled:false   -> the in-MILP-window PGD attacker is dead with no
#                                   MILP windows (it waits on a lock that never sets)
#   phase26_pre_cascade_enabled:true -> KEPT as the SAT catcher (budget tuned above):
#                                   recovers the 5 resnet_large SAT cases the cascade
#                                   used to catch via parallel-PGD-during-MILP.
max_tighten_layer: 0
parallel_pgd_enabled: false
phase26_pre_cascade_enabled: true
# Reverse-mode alpha-zono state build: the false-verify bug is FIXED (2026-06-07).
# Root cause was NOT a backward-math bug (build_state_reverse is bit-exact vs
# autograd on conv/fc/relu/add-skip — see tests/test_reverse_g.py). It was a
# formulation-tag dispatch bug: build_state_reverse returned formulation='sparse'
# while its data is in the alpha-zono parametrization, so build_gen_lp_from_state
# routed it to the generic y=e_new∈[0,hi] direct-ReLU MILP builder — a coordinate-
# system mismatch that built a too-tight (unsound) polytope. The high-bin MILP
# fallback then read +0.235 (vs the correct -0.146) and false-verified 6 SAT cases.
# The dual-ascent BnB reads the state fields directly (ignores the tag) so it
# stayed sound — which is why it only surfaced through the MILP fallback, and only
# on the reverse path (forward was too slow to reach the fallback). Fix: tag the
# reverse state 'alpha_zono'. Re-validated: all 15 resnet_large SAT cases return
# timeout/not-unsat with sat-off (0 false-verify). reverse-g is ~3.3x faster at
# state build here (2.63s -> 0.80s on prop_1063), freeing budget for the BnB.
# Kept OFF in production pending a full 71-case re-sweep to confirm the score does
# not regress before flipping the merged benchmark's behavior.
phase8_reverse_g: false
phase8_reverse_g_batched: false
