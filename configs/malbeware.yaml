# malbeware — VNNCOMP regular track. 150 instances across 3 small
# malware-classifier models: linear (Gemm only), 4-25 (1 Conv + 1 Gemm),
# 16-25 (1 Conv + 1 Gemm, wider). 4096-input 64×64 images, 25 classes.
#
# Disable the `auto_route_milp_for_conv` shortcut — the historical
# milp_verify path racing-escalates bins without converging on these
# eps-3 perturbations. The graph pipeline (CROWN + α-CROWN + spec MILP)
# closes SAT and most UNSAT in seconds.
auto_route_milp_for_conv: false
input_split_enabled: false
# These 4-25 eps-3 cases need the FULL MILP encoding (~4917 unstable neurons,
# cuts ON) to close — the small-bin racing plateaus at lb≈-0.75. The default-on
# all-bins racer (phase8_race_all_bins) handles this automatically: it races a
# cuts-ON all-neurons task that proves the margin bound > 0 in ~2 s (AB-CROWN's
# `complete_verifier: mip` strategy). `high_bin_count: all` keeps the same full
# encoding for the post-racing fallback backup.
phase8_high_bin_count: all
phase8_high_bin_time_limit: 25.0
