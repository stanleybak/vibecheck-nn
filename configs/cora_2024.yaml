# cora_2024 — VNNCOMP regular track. 180 instances across 9 MLPs.
#
# Borrows the cifar100 Phase-8 dual-ascent config to crack hard cifar10-set
# UNSAT cases (img96 cracked in 10 s with this; without it, hits 30 s timeout).
phase8_use_dual_ascent_gpu: true
phase8_dual_ascent_max_iter: 1
zono_lift_enabled: false
phase2_crown_enabled: false
phase8_min_budget_frac: 0.5
pgd_middle_enabled: false
bab_refine_passes: 1
bab_refine_window: 1
# LEAN Phase-1 (2026-06-07): skip the Gurobi MILP-tighten cascade. The cascade
# was tuned to close cifar10-set img100 in ~29s (MILP@L1+L2), but the fast GPU
# Phase-8 dual-ascent BaB (+input-split) closes it from the phase-0.5 alpha-CROWN
# bounds in ~12s WITHOUT the MILP (img398 in 5s) — the cascade was not actually
# load-bearing. Same lean win as tinyimagenet/cifar100. Sound by construction
# (looser input bounds only make the sound Phase-8 BaB more conservative; cora is
# FC so reverse-g is not used). max_tighten_layer was 2; milp_sample_timeout now
# moot.
max_tighten_layer: 0
# PGD knobs
pgd_restarts: 128
pgd_time_budget_phase0: 2.0
input_split_batched_enabled: true
input_split_batched_clip_enabled: true
input_split_batch_size: 4096
phase26_pgd_per_spec_min_per_spec: 0.5
phase26_pgd_per_spec_strict_min: true
phase26_pre_cascade_total_frac: 0.1
phase26_pre_cascade_per_spec_cap: 5.0
# parallel_pgd dead with no MILP windows (waits on a lock that never sets).
parallel_pgd_enabled: false

# Exact-MILP routing for the hopeless-relaxation misses (2026-06-09): cora's 8-layer
# FC/ReLU nets split cleanly at Phase-8 entry — solved cases enter at worst ≥ −0.65
# (BnB closes ≤1s), misses at ≤ −3.3 (BnB frontier doubles → 67M-node OOM; heavy
# tightening only moved −3.33 → −3.18). The exact per-neuron MILP (milp_verify,
# safenlp's engine) closes all 7 cifar10 misses in 0.9–3.6s, well inside the 30s
# budget. Hardness is complementary (img100: BnB-easy/MILP-hard), so route ONLY
# far-below-zero cases; near-boundary keeps the BnB. +7 vs the v1 sweep.
phase8_exact_milp_below: -2.0
