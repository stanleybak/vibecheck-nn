# ml4acopf_2024 (regular track, 69 instances, 600s timeout).
#
# AC optimal-power-flow surrogate nets ending in non-linear physics (Concat of
# Sigmoid / Mul / Sin / Cos power-flow branches), 14/118/300-bus. No config
# OVERRIDES are needed: the verifier auto-detects the non-linear graph and routes
# to the forward-LiRPA + α-CROWN + nonlinear-split dual-ascent BaB path
# (verify_graph._verify_nonlinear_graph) at verify time — independent of the profile (confirmed: the
# graph-aware auto-profile differs from plain defaults only on metadata). This
# file exists solely so the sweep (which matches benchmarks by config name) picks
# the benchmark up; verdicts/behavior equal the documented default-settings runs.
#
# Status (docs/benchmarks/ml4acopf_2024.md): near-parity with α,β-CROWN on the
# init-CROWN cases; the dtype-aware band-pad fix closes full-net prop3 to unsat.
# The hardest 118/300 cases time out for BOTH tools (nested degree-3 power-flow
# bilinears). Integration: tests/integration/test_ml4acopf_2024.py (4 cases).

raise_on_oom: true     # default, explicit: OOM raises (no slow/misleading CPU fallback)

# Power-systems CPU override: the acopf/trig path follows settings.device (default
# GPU) so other trig-routed nets (adaptive_cruise) get faster PGD. GPU is sound for
# ml4acopf too (same unsat verdicts), but MEASURED 1.3-2.4x SLOWER on 14_ieee
# (prop2-linear 6.9s cpu vs 16.8s gpu; prop3-full 3.6 vs 4.8; prop3-linear 10.1 vs
# 21.2) — small nets where float64 + Gurobi-LP + cuda<->cpu transfers make GPU
# overhead net-negative. So pin CPU.
device: cpu


# Linear-surrogate variants encode sigmoid/sin/cos as ReLU lookup tables;
# merge them to tightly-bounded 1-D PWL nodes (else the expanded ReLU stack
# blows the bound up: 118-linear-residual nl_alpha margin -38.69).
merge_relu_lookup_table: true

# Monotone-output inversion: exact+fp32-validated certification of the
# scale*sigmoid(z)+bias head (closes the linearized 118/300 prop3/prop4 the
# relaxation path times out on). Gated; inert on non-matching nets.
monotone_output_inversion: true
