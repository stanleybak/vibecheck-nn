# tinyimagenet_2024 — TinyImageNet ResNet, VNNCOMP regular track.
# Same config as cifar100_2024 — both ran under runner_p25off.py in v6
# side-by-side. PatchesZonotope is auto-engaged via settings.zono_impl when
# the input shape is image-like (default: 'patches'); no explicit knob here.
phase8_use_dual_ascent_gpu: true
phase8_dual_ascent_max_iter: 1
zono_lift_enabled: false
phase2_crown_enabled: false
phase8_min_budget_frac: 0.5
pgd_middle_enabled: false
# SAT schedule: Phase-0 PGD screens for counterexamples up front, then Phase-8
# BnB + Phase-9 OSI-PGD on survivors. (The old pre-cascade PGD hook + its 5s cap
# are disabled below — they only attacked during MILP windows, which no longer
# exist now that the MILP cascade is skipped.) These per-spec PGD knobs still
# govern Phase 2.6 / Phase 9.
phase26_pgd_per_spec_min_per_spec: 0.5
phase26_pgd_per_spec_strict_min: true
phase26_pre_cascade_total_frac: 0.10
phase26_pre_cascade_per_spec_cap: 5.0
pgd_restarts: 100
# Lean Phase-1: the per-layer Gurobi MILP-tighten cascade (~27s, CPU) was
# largely wasted — α-CROWN (phase 0.5) closes nearly all disjuncts and the fast
# GPU Phase-8 BnB closes the rest from phase-0.5 bounds. Skipping it (all-GPU
# path) ~halves UNSAT wall and REGRESSES NOTHING: validated 200-case sweep vs
# α,β-CROWN = 0 false-verify, 0 MISS, +9 cases ABC timed out on, and faster on
# every hard case (prop_7542: 27s vs ABC 102s). Sound by construction (looser
# input bounds only make the sound Phase-8 BnB more conservative).
#   max_tighten_layer:0          → skip the MILP-tighten cascade (gates line 3738)
#   parallel_pgd_enabled:false   → the in-MILP-window PGD attacker is redundant
#                                   with no MILP windows; Phase 0/2.6/9 PGD cover SAT
#   phase26_pre_cascade_enabled:false → the pre-cascade PGD hook only existed to
#                                   attack during MILP windows; also redundant now
max_tighten_layer: 0
parallel_pgd_enabled: false
phase26_pre_cascade_enabled: false
# Reverse-mode α-zono state build (backprop from the ~2k unstable neurons instead
# of forward-propagating ~11k generator columns) + batched over all open spec
# directions in one backward. Validated bit-identical (a_g Δ=0, identical BnB node
# counts) to the forward build; cuts Phase-8 state_build 5.78→2.95s on the A10G.
# CUDA-only (falls back to the forward build on CPU).
phase8_reverse_g: true
phase8_reverse_g_batched: true
