# vggnet16_2022 — ImageNet VGG16 (3x224x224): 13 Conv + 5 MaxPool + 3 FC.
# Robustness specs perturb only a FEW pixels (spec0: 1 pixel, eps~1e-5), so the
# input box has ~1 varying dim — input-split + forward-zono is the right regime.
# Keep verify_graph on its OWN zono+CROWN+input-split path (which has a sound
# box-approximation max_pool); do NOT auto-route conv graphs to milp_verify/
# gpu_layers, which has no MaxPool handler.
#
# This solves spec0–14 (15/15) via input-split + forward-zono. The 3 full-image
# cases (spec15/16/17, ALL 150528 px perturbed) explode the forward zono and need
# the patches-mode backward-CROWN retighten engine (src/vibecheck/patches_crown.py)
# enabled below. With the torch.compile + maxpool-fusion speedups (commit 2493ff6),
# **spec15 verifies `unsat` in ~1108 s (Phase1+2 1079 s, worst=+5.3291 == ABC)**,
# in budget. spec16 (~1376 s) and spec17 (forward-zono OOM at 100× ε) still exceed
# 1200 s — ABC also clears only spec15 (16/18 == ABC). See docs/benchmarks/
# vggnet16_2022.md. NOTE: the retighten engine internally activates only when the
# forward bounds need it (full-image specs); the few-pixel spec0–14 stay on the
# input-split path, so these flags are sound + verdict-preserving for them (the
# `tests/integration` vggnet pins guard against regression). `phase1_method=plain`
# / `tighten_formulation=skip` / `max_tighten_layer*=0` are what the full-image
# path requires; capping crown_retighten_max_neurons does NOT help (un-retightened
# neurons keep exploded box bounds → bound explodes, cap=10000 → -1.5e8).
auto_route_milp_for_conv: false
crown_retighten_forward: true
crown_retighten_patches: true
box_reduce_patch_budget: 6.0e+9
box_reduce_on_oom: true
phase1_method: plain
tighten_formulation: skip
max_tighten_layer: 0
max_tighten_layer_lp: 0
crown_retighten_chunk: 64
