# challenging_certified_training_2026 — IBP-trained CNN7s (5 Conv + 2 Gemm,
# pure ReLU, linear chain), cifar10 eps2/eps8 + tinyimagenet eps1, each in a
# normal and a wide variant. 60 instances, timeouts 30/120/550 s.
# instances.csv ships CRLF line endings (bash sweeps need `tr -d '\r'`).
#
# Two routes by input size (gate in verify_graph.py auto-route block):
#
# 1) cifar10 (3072-dim): graph PIPELINE with phase-8 dual-ascent BaB.
#    The zonotope state fits comfortably, and the dual-ascent BnB closes
#    the queries that survive alpha in ~50 nodes / 0.01 s (measured
#    eps2_cnn7 idx5507_sample3: unsat 26 s vs ABC 22 s — the milp-path
#    custom BaB plateaued on the same queries for 5 orders of magnitude
#    more domains). Settings below mirror tinyimagenet_2024.yaml's lean
#    all-GPU profile.
auto_route_milp_for_conv: false
phase8_use_dual_ascent_gpu: true
phase8_dual_ascent_max_iter: 1
zono_lift_enabled: false
phase2_crown_enabled: false
phase8_min_budget_frac: 0.5
pgd_middle_enabled: false
max_tighten_layer: 0
parallel_pgd_enabled: false
pgd_restarts: 100
#
# 2) tinyimagenet (12288-dim): milp graph path with the CROWN-IBP Phase 1.
#    The zono forward's input-identity generators need ~12 GiB per layer at
#    fp32 (12288 gens x 262144 acts), two consecutive layers OOM a 24 GB
#    A10G — no pipeline fits a zonotope here. IBP Phase 1 + chunked
#    per-target big-layer tightening + joint alpha + ibp-BaB solve 5 of the
#    6 probe classes (the 550s eps1 UNSAT tail needs more — see README).
phase1_ibp_input_dim_threshold: 8000
milp_graph_alpha_enabled: true
milp_graph_tighten_enabled: false
milp_graph_tighten_big_layers: true
milp_graph_ibp_bab_enabled: true
milp_graph_ibp_bab_split_deepest: true
milp_graph_escalation_enabled: false
