# nn4sys — VNNCOMP regular track. 194 instances across 12 models
# (lindex, lindex_deep, mscn_*, pensieve_*).
#
# Defaults work for lindex/lindex_deep + pensieve_simple/mid_simple
# variants (46/194). The remaining cases need either:
#   - pensieve_*_parallel: ONNX model input-shape inference is wrong;
#     loader picks (1, 8) but model expects (12, 8). Fix is in
#     `onnx_loader.py` shape resolution (separate workstream).
#   - mscn_*: Div + ReduceSum ops aren't supported in zonotope forward.
#
# This benchmark hit two critical soundness bugs (now fixed on main):
#   1. milp_verify Gurobi FeasibilityTol vs float32-zono ulp mismatch
#      (1/10 false-verified on metaroom; affected all milp_verify users).
#   2. vnnlib parser dropped per-disjunct X constraints + overwrote
#      X bounds across (and ...) blocks (22 of 194 lindex_* cases
#      returned false-SAT pre-fix).
#
# mscn_*: the per-disjunct subbox backward needs the mul/div_bilinear McCormick
# input boxes threaded in (the forward-LiRPA path doesn't match the global
# stash). `per_disjunct_bilinear_boxes` fixes the NotImplementedError and lets
# the per-q CROWN + BAB close the cardinality subboxes (verified: dual cases up
# to ~6670 subboxes unsat within budget). It is now ON by default (a sound
# correctness fix, validated inert on the other bilinear benchmarks), so no
# override is needed here.
#
# mscn_* ROUTING: these nets have both-vary bilinear Muls, so verify_graph's
# nonlinear auto-router (_route_nonlinear, added in 762cc34) hijacks them into the
# forward-zono nl_alpha path, which plateaus and times out (mscn_2048d
# cardinality_0_1 regressed 20s -> timeout; +9 more mscn cases). Declaring the
# batched input-split BaB as the intended strategy makes the router DEFER (the
# same opt-out lsnc_relu got in fcb71d0), routing mscn back to the input-split
# path that closes them (cardinality_0_1 -> unsat ~50s on AWS).
input_split_batched_enabled: true

