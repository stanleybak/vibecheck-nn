description: "Network-pair isomorphism (isomorphic-to): merge f,g and check the +/-eps output relation."
# isomorphic_acasxu_2026 — network-PAIR (original f vs perturbed g) merged into one
# acasxu-sized net; the property is an OR of |Y_g - Y_f| >= eps atoms. Reuses the
# acasxu_2023 input-split + backward-CROWN profile (the merged net is acasxu-shaped):
# without an explicit config the default input_split_small profile is too weak and
# every UNSAT case TIMES OUT (e.g. instance_33: unknown@50s -> unsat@17s with this).
#
# acasxu_2023 — small FC controller (5-D input, 6×50 ReLU layers).
# VNNCOMP regular track, 186 cases (prop_1..10 across 45 nets).
#
# Spec shapes:
#   prop_2: Y_0 >= Y_i for all i=1..4 (single-disjunct AND of 4 pairwise,
#           "COC maximal"). Many SAT cases need narrow-region search.
#   prop_3: Y_0 <= Y_i for all i=1..4 ("COC minimal"). UNSAT-leaning.
#   prop_1, 5-10: threshold or pairwise; varied.
#
# ALGORITHM: input-split BaB with BACKWARD-CROWN intermediate bounds
# (`bound_prop_method: crown`, exactly what AB-CROWN uses for acasxu).
#
# Why not the old forward-zonotope intermediate bounds: they are ~2x too loose
# for ACAS Xu's amplifying weights (root spec margin fwd-zono -2570 vs crown -1101
# on 3_3 prop_2; -4691 vs -2148 on 1_1 prop_1), so the BaB DIVERGED (6.8M leaves,
# never converged). Backward CROWN (seed [I,-I] per ReLU layer, min-area slopes,
# no alpha) is both tighter AND cheaper -> the BaB converges. prop_1 1_1 0.1s,
# prop_3 1_1 4s, 3_3 prop_2 ~110s (the hardest; ABC does it in ~18s -- the gap is
# the CPU-side split loop / leaf count, NOT bound quality: a mutual zono<->CROWN
# tightening was measured to add only ~3% margin, sub-threshold to close a leaf
# one bisection earlier, so it does not reduce leaf count -- see
# scratch/acasxu_p2_33/plan.md explore11-14).
#
# Why not the freeze-replay hybrid (use_hybrid_acasxu): its per-layer alpha freeze
# has no fast deadline and overran to 150-180s on server1's RTX 3080 -> 13/32
# timeout-misses (mostly prop_1's wide box). The input-split+CROWN path verifies
# prop_1 in <1s instead. Hybrid kept available behind the flag but OFF.
use_hybrid_acasxu: false
input_split_batched_enabled: true
input_split_crown_intermediate: true       # backward-CROWN intermediate bounds
# SAT-finding: Phase-0 PGD (OSI init) catches the wide-witness SAT cases before
# the BaB. The NARROW-witness cases (1_5/1_6/3_2/5_3 prop_2, multi-disjunct
# prop_7/prop_8) are missed by root-box PGD — the witness fills a tiny fraction
# of the root — so leaf-level PGD attacks the narrowest surviving leaves every
# few BaB iters, where the witness fills a large fraction of the (now narrow)
# leaf box. Without this the input-split+CROWN path returns unknown on every
# narrow-SAT case (the freeze-replay hybrid caught them via between-rounds PGD).
pgd_init_mode: osi
pgd_time_budget_phase0: 5.0
input_split_leaf_pgd_every: 3
input_split_leaf_pgd_max_leaves: 128
input_split_leaf_pgd_restarts: 256
input_split_leaf_pgd_iters: 50

# Selective batched α-CROWN on boundary leaves. Plain backward-CROWN leaves a
# tiny tail of leaves whose per-query spec lb plateaus a hair below 0; bisection
# can't close them — they shrink to width < 1e-12 (fp32 floor) and get dropped
# as `degenerate`, so the whole case reports `unknown`. Diagnosed on 3_3 prop_2
# (A10G): of 1.88M leaves, exactly ONE was left degenerate → unknown@63s. ABC
# closes such leaves with α-CROWN (per-neuron lower-slope optimization). Enabling
# a WIDE boundary band (eps=10: any unclosed leaf whose worst-disjunct best-query
# lb is within 10 of 0) closes those leaves EARLY, before they degenerate ->
# 3_3 prop_2: 1.88M leaves/unknown@63s -> 431k leaves/verified@22s on A10G (ABC
# ~18s). eps=1 only catches the final leaf (verified but still 1.42M leaves/63s);
# the wide band is what collapses the leaf count. See scratch/acasxu_crown_33p2.
input_split_batched_alpha_boundary_eps: 10.0
input_split_batched_alpha_iters: 20
input_split_batched_alpha_max_leaves: 2048

# prop_6/7/8 have a DISJUNCTIVE INPUT region → routed through the
# per-disjunct-subbox path (`_verify_per_disjunct_subboxes`), one batched BaB
# per subbox. By default each subbox gets only `rem_time / n_subboxes` of the
# budget; prop_6's 2 subboxes each need >half the 116s cap on a slow GPU, so
# the fractional split (58s each) times BOTH out. Serial mode gives each subbox
# the full remaining budget greedily (still bounded by total_timeout, so the
# wall cap holds): sub0 takes what it needs, sub1 takes the rest. Fixes
# 1_1 prop_6 unknown→verified on the A10G. Only 3 acasxu props are disjunctive-
# input and they have ≤2 subboxes, so greedy-serial can't starve.
input_split_serial_disjuncts: true
