# acasxu_2023 — small FC controller (5-D input, 50×6 ReLU layers).
# VNNCOMP regular track, 187 cases (47 SAT + 140 UNSAT).
#
# Spec shapes:
#   prop_2: Y_0 ≥ Y_i for all i=1..4 (single-disjunct AND of 4 pairwise,
#           "COC maximal"). Many SAT cases need narrow-region search.
#   prop_3: Y_0 ≤ Y_i for all i=1..4 ("COC minimal"). UNSAT-leaning.
#   prop_1, 5-10: threshold or pairwise; varied.
#
# Freeze-replay α-CROWN with TIGHTENED intermediate bounds
# (verify_hybrid_acasxu). The batched input-split BaB used forward-zonotope
# intermediate bounds, which are ~1000x too loose for ACAS Xu's amplifying
# weights — root spec margin -1597 vs true >0 — so it DIVERGED (6.8M leaves,
# never converges; e.g. 3_3 prop_2 timed out). _full_freeze tightens per-layer
# pre-ReLU bounds via backward α-CROWN (seed [I,-I] per layer, optimize earlier
# layers' α, intersect with forward-zono so it stays SOUND), then _replay_batched
# reuses the frozen α cheaply per leaf. 3_3 prop_2 unsat 48s, 1_1 prop_3 unsat
# 32s, 1_5 prop_2 sat 2s — all within the 116s competition timeout. The MILP
# escalation that dominated the old path (Gurobi pool spawn overhead) is dropped.
use_hybrid_acasxu: true
input_split_batched_enabled: true   # fallback if hybrid is disabled
pgd_init_mode: osi
# Speed: the between-rounds PGD is wasted on the 139 UNSAT cases. every-3 × 500
# restarts is ~31% faster on hard UNSAT (3_3 prop_2 48s->33s) and still catches
# all 4 narrow-witness SAT cases (1_5/1_6/3_2/5_3 prop_2). freeze_iters 50 (no
# tightness loss vs 100). _full_freeze now also respects the timeout (was
# overrunning to 150-180s on slower GPUs -> false timeout-misses).
hybrid_pgd_between_every: 3
hybrid_pgd_between_restarts: 500
hybrid_freeze_iters: 50
