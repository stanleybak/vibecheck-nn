[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vibecheck"
version = "0.1.0"
description = "Vibe-Coded Neural Network Verification Tool"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "onnx",
    "torch",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-cov", "pyyaml", "onnxruntime"]

[project.scripts]
vibecheck = "vibecheck.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
markers = [
    "integration: per-benchmark verdict regression tests (slow; require GPU + vnncomp benchmarks)",
]
